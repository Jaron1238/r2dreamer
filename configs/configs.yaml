defaults:
  - model: size100M
  # Disable Hydra's Python logging-to-file (train.log)
  - override hydra/job_logging: disabled
  - _self_

logdir: logdir/${now:%Y-%m-%d}/${now:%H-%M-%S}
seed: 0
deterministic_run: False
device: 'cuda'
phase: 1
# Depth is now an optional auxiliary supervision signal for the depth_aux_head.
# The main RSSM image is always 6-channel RGB+diff regardless of this flag.
use_depth_aux: False

hydra:
  run:
    dir: ${logdir}

env:
  reward_curriculum_phase: 0  # 0=conservative, 1=balanced, 2=aggressive (independent of training phase)
  encoder:
    mlp_keys: '$^'
    cnn_keys: 'image'
  decoder:
    mlp_keys: '$^'
    cnn_keys: 'image'

batch_size: 1
batch_length: 256

buffer:
  batch_size: ${batch_size}
  batch_length: ${batch_length}
  max_size: 5e5
  device: ${device}
  storage_device: 'cpu'

trainer:
  steps: 100000
  batch_per_gpu: 4
  batch_length: 256
  checkpoint_every: 500
  log_every: 50
  num_workers: 4
  accumulation_steps: 6
  burn_in_steps: 16
  augmentation:
    noise_std: 0.05
    depth_noise_std: 0.02
    resolution_scale_min: 0.5
    resolution_scale_max: 1.0
    use_flip: true
    use_brightness: true
    brightness_std: 0.1
    use_cutout: false
    cutout_size: 32

dataset:

  mode: 'streaming'
  hf_repo: 'dein_benutzername/dein_fpv_dataset' # Hier den Pfad zu deinem HF-Dataset einfügen
  shuffle_buffer: 10000
  raw_image_mode: 'grayscale' # grayscale|rgb
  raw_dataset:
    enabled: false  # set true only when local crash folders exist; cloud runs use streaming instead
    hf_repo: ""
    split: "train"
    streaming: true
  require_osd: false  # OSD-Werte werden in der Loss-Funktion nicht genutzt; true würde ~90% der Daten filtern

model:
  img_height: 288          # RSSM encoder/decoder resolution (Landscape: H=288, W=512)
  img_width: 512
  safety_img_height: 720   # SafetyNet resolution (Landscape: H=720, W=1280) (höher für obstacle detection)
  safety_img_width: 1280
  act_dim: 4               # Anzahl Steuerkanäle (roll, pitch, yaw, throttle)
  phase: ${phase}
  use_depth_aux: ${use_depth_aux}
  use_cam_overlay: False
  motor_inertia_range: [0.1, 0.8]
  use_latent_goals: True
  ctx_consistency_weight: 0.1
  ctx_warmup_steps: 1000
  safety_input_key: "raw_image" # image|raw_image
  # safety_in_channels is now auto-derived from dataset.raw_image_mode
  # (grayscale→1, rgb→3). Remove or ignore this value — it is no longer read.
  infonce_temperature: 0.07
  throttle_index: 3              # unified throttle axis: action[3]
  num_drones: 100                # generous buffer; model guards with % num_drones
