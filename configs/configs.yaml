defaults:
  - model: size100M
  # Disable Hydra's Python logging-to-file (train.log)
  - override hydra/job_logging: disabled
  - _self_

logdir: logdir/${now:%Y-%m-%d}/${now:%H-%M-%S}
seed: 0
deterministic_run: False
device: 'cuda'
phase: 1
use_depth: True

hydra:
  run:
    dir: ${logdir}

env:
  encoder:
    mlp_keys: '$^'
    cnn_keys: 'image'
  decoder:
    mlp_keys: '$^'
    cnn_keys: 'image'

batch_size: 1
batch_length: 64

buffer:
  batch_size: ${batch_size}
  batch_length: ${batch_length}
  max_size: 5e5
  device: ${device}
  storage_device: 'cpu'

trainer:
  steps: 100000
  batch_per_gpu: 1
  batch_length: 64
  checkpoint_every: 500
  log_every: 50
  num_workers: 4
  accumulation_steps: 16
  burn_in_steps: 5
  augmentation:
    noise_std: 0.05
    depth_noise_std: 0.02
    resolution_scale_min: 0.5
    resolution_scale_max: 1.0
    use_flip: true
    use_brightness: true
    brightness_std: 0.1
    use_cutout: false
    cutout_size: 32

dataset:

  mode: 'streaming'
  hf_repo: 'dein_benutzername/dein_fpv_dataset' # Hier den Pfad zu deinem HF-Dataset einfügen
  shuffle_buffer: 10000
  raw_image_mode: 'grayscale' # grayscale|rgb
  raw_dataset:
    enabled: true
    source: "folders" # folders|streaming
    root: "./dataset_temp/event_clips/crashes"
    hf_repo: ""
    split: "train"
    streaming: true
  require_osd: true

model:
  img_height: 256
  img_width: 256
  phase: ${phase}
  use_depth: ${use_depth}
  safety_input_key: "raw_image" # image|raw_image
  safety_in_channels: 1
  infonce_temperature: 0.07
